# route.yaml

baseurl: http://xxxx.xxxxx.xxx/xxxx
tokenpath: oauth/token
operationpath: operation/boxes

modes:
  - valor
  - tassadar
  - yifeng
  - watsons
  - watsonsha

valor:
    cpe: business/cpes
    pop: vpn/pops
    dve:
        pool: device/cpes
        remote: configuration/enable_remote?
    pse: 2000  #PageSize

yifeng:
    cpe: business/cpes
    pop: vpn/pops
    dve:
        pool: device/cpes
        remote: configuration/enable_remote?
    pse: 1000

tassadar:
    cpe: business/cpes
    pop: vpn/pops
    dve:
        pool: device/cpes
        remote: enable_remote?
watsons:
    cpe: nexus/business/boxes
    pop: nexus/openvpn/entries
    dve:
        pool: nexus/device/boxes
        remote: support_remote?
    pse: 4500  #PageSize

watsonsha:
    cpe: nexus/business/boxes
    pop: nexus/openvpn/entries
    dve:
        pool: nexus/device/boxes
        remote: support_remote?
    pse: 100  #PageSize
